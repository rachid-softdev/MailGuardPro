name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'mailguardpro-mobile/**'
      - 'packages/**'
  pull_request:
    branches: [main]
    paths:
      - 'mailguardpro-mobile/**'
      - 'packages/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run build