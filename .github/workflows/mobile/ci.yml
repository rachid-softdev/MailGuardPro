name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'mailguardpro-mobile/**'
      - 'packages/**'
  pull_request:
    branches: [main]
    paths:
      - 'mailguardpro-mobile/**'
      - 'packages/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build